# .github/workflows/R-CMD-check.yml
# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      # Quarto CLI for .qmd vignettes
      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # UPDATED: install deps needed for check + vignettes + pkgdown
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            github::USCBiostats/barryr
            any::rcmdcheck
            any::quarto
            any::pkgdown
            local::.
          needs: check
          working-directory: imaginarycss

      # Linux release: stricter flags and separate step
      - uses: r-lib/actions/check-r-package@v2
        if: ${{ matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release' }}
        with:
          args: 'c("--as-cran", "--no-manual")'
          upload-snapshots: false
          upload-results: false
          check-dir: '"check"'
          error-on: '"warning"'
          working-directory: imaginarycss

      # All other matrix entries
      - uses: r-lib/actions/check-r-package@v2
        if: ${{ matrix.config.os != 'ubuntu-latest' || matrix.config.r != 'release' }}
        with:
          upload-snapshots: false
          upload-results: false
          check-dir: '"check"'
          error-on: '"warning"'
          working-directory: imaginarycss

      # Build a source tarball on Ubuntu (release/devel) and upload as artifact
      - name: Build the package
        if: ${{ matrix.config.os == 'ubuntu-latest' && (matrix.config.r == 'release' || matrix.config.r == 'devel') }}
        run: R CMD build .
        working-directory: imaginarycss

      - uses: actions/upload-artifact@v4
        if: ${{ matrix.config.os == 'ubuntu-latest' && (matrix.config.r == 'release' || matrix.config.r == 'devel') }}
        with:
          name: imaginarycss-built-package-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: imaginarycss/imaginarycss_*.tar.gz
          retention-days: 7
