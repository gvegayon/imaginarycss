on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-pandoc@v2
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          
      # Install Quarto CLI
      - name: Install Quarto
        run: |
          wget https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.deb
          sudo dpkg -i quarto-linux-amd64.deb
          quarto --version
          
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::quarto
          needs: website
          working-directory: imaginarycss
          
      - name: Build site
        run: |
          options(pkgdown.internet = FALSE)
          pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}
        working-directory: imaginarycss
        
      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: imaginarycss/docs